spring.application.name=candas-backend

# Perfil activo por defecto para desarrollo local.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
# Mismo secreto que PresintoUtil para migración V116 (regenerar codigo_presinto HMAC)
flyway.placeholders.presinto_secret=${candas.presinto.secret:${jwt.secret:${PRESINTO_SECRET}}}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Código presinto (etiqueta Zebra): HMAC con esta clave. Si no se define, se usa jwt.secret.
candas.presinto.secret=${PRESINTO_SECRET}

# CORS: orígenes del frontend (lista separada por comas). Solo vía .env / variables de entorno.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Usuario administrador inicial. Solo se usa al crear la base/usuario por primera vez.
app.bootstrap.create-default-admin=${CREATE_DEFAULT_ADMIN:false}
app.bootstrap.admin.username=${ADMIN_USERNAME:admin}
app.bootstrap.admin.password=${ADMIN_PASSWORD:}
app.bootstrap.admin.email=${ADMIN_EMAIL:admin@candas.com}
app.bootstrap.admin.full-name=${ADMIN_FULL_NAME:Administrador del Sistema}

# Coste de BCrypt. 12 ofrece una defensa razonable sin fijarlo en el código.
app.security.bcrypt-strength=${BCRYPT_STRENGTH:12}
app.auth.public-registration-enabled=${PUBLIC_REGISTRATION_ENABLED:false}

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Healthcheck para Docker y Railway. Solo se expone el endpoint de salud.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Cargar variables de entorno desde el archivo .env (si existe).
# Primera ruta: .env en el directorio de trabajo (ej. al ejecutar desde candas-backend).
# Segunda ruta: candas-backend/.env cuando el cwd es la raíz del monorepo (ej. desde IDE o raíz).
spring.config.import=optional:file:.env[.properties],optional:file:candas-backend/.env[.properties]
