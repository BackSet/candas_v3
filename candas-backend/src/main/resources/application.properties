spring.application.name=candas-backend

# Perfil activo por defecto para desarrollo local.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
# Mismo secreto que PresintoUtil para migración V116 (regenerar codigo_presinto HMAC)
flyway.placeholders.presinto_secret=${candas.presinto.secret:${jwt.secret:${PRESINTO_SECRET}}}

# JWT Configuration
jwt.secret=${JWT_SECRET:candas-secret-key-very-long-secret-key-for-jwt-token-generation-minimum-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Código presinto (etiqueta Zebra): HMAC con esta clave. Si no se define, se usa jwt.secret.
candas.presinto.secret=${PRESINTO_SECRET}

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Cargar variables de entorno desde el archivo .env (si existe).
# Primera ruta: .env en el directorio de trabajo (ej. al ejecutar desde candas-backend).
# Segunda ruta: candas-backend/.env cuando el cwd es la raíz del monorepo (ej. desde IDE o raíz).
spring.config.import=optional:file:.env[.properties],optional:file:candas-backend/.env[.properties]
