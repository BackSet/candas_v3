server.port=${PORT:8080}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# CORS de producción (Railway frontend URL, separable por comas).
# Soporta ambas variables por compatibilidad: CORS_ALLOWED_ORIGINS y CORS_ALLOWED_ORIGIN_PATTERNS.
candas.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.up.railway.app}}
