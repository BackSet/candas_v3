server {
    # Railway: IPv4 + IPv6 (el edge puede enrutar por cualquiera; ver DEPLOYMENT.md).
    listen 0.0.0.0:${PORT};
    listen [::]:${PORT} ipv6only=on;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cabeceras de seguridad (similar al stack Ecubox/Caddy)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PWA: el service worker debe revalidarse siempre para propagar actualizaciones.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files $uri =404;
    }

    # PWA: manifest con tipo MIME correcto y sin caché agresiva.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # El HTML de entrada referencia assets hasheados; debe revalidarse para ver releases.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
